<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵枢 — AI 调研助手</title>
<link rel="stylesheet" href="/static/css/lingShu.css">
</head>
<body>

<!-- ═══════════ SPLASH ═══════════ -->
<div id="splash">
  <div class="splash-content">
    <div class="splash-logo">⚡</div>
    <div class="splash-title">灵枢</div>
    <div class="splash-subtitle">LingShu Agent · AI 调研助手</div>
    <div class="splash-spinner"></div>
    <div class="splash-status">初始化中...</div>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app"></div>

<!-- ═══════════ TOAST ═══════════ -->
<div id="toast" class="toast"></div>

<script>
// ─── API helper ───
const API = {
  async get(path) {
    const r = await fetch(path); const d = await r.json(); return d;
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    }); return await r.json();
  },
  async upload(path, formData) {
    const r = await fetch(path, { method: 'POST', body: formData });
    return await r.json();
  },
};

// ─── Toast ───
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Router ───
async function init() {
  try {
    const config = await API.get('/v1/setup/config');
    if (config.setup_complete) {
      renderDashboard();
    } else {
      renderSetup();
    }
  } catch(e) {
    renderDashboard();
  }
  // Hide splash
  setTimeout(() => document.getElementById('splash').classList.add('hidden'), 200);
}

// ═══════════════════════════════════
// SETUP WIZARD
// ═══════════════════════════════════
let setupStep = 1;
let setupData = { paths: [], llm: {}, env: {} };

function renderSetup() {
  document.title = '灵枢 — 初始化配置';
  document.getElementById('app').innerHTML = `
    <div class="container" style="max-width:720px">
      <div class="welcome" id="setup-welcome">
        <h1 style="font-size:42px; letter-spacing:2px">⚡ 灵枢</h1>
        <div style="color:var(--accent); font-size:14px; margin-bottom:4px">LingShu Agent</div>
        <p class="subtitle">AI 调研助手 — 64 秒出正式报告</p>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
          <button class="btn btn-primary" onclick="startSetup()" style="font-size:16px; padding:14px 36px">
            开始配置 →
          </button>
          <button class="btn btn-success" onclick="quickStart()" style="font-size:16px; padding:14px 36px">
            ⚡ 快速开始 — 一键自动配置
          </button>
        </div>
        <div class="feature-list" style="margin-top:48px">
          <div class="feature-item"><div class="icon">🔍</div><div class="name">深度调研</div><div class="desc">多角度搜索 × AI 分析</div></div>
          <div class="feature-item"><div class="icon">📄</div><div class="name">正式报告</div><div class="desc">A4 排版 · 一键生成</div></div>
          <div class="feature-item"><div class="icon">📚</div><div class="name">知识库</div><div class="desc">文件上传 RAG 检索</div></div>
          <div class="feature-item"><div class="icon">💬</div><div class="name">对话式交互</div><div class="desc">智能体全程驱动</div></div>
        </div>
      </div>
      <div id="setup-content" class="hidden"></div>
    </div>`;
}

function startSetup() {
  document.getElementById('setup-welcome').classList.add('hidden');
  document.getElementById('setup-content').classList.remove('hidden');
  setupStep = 1;
  renderStep1();
}

async function quickStart() {
  const el = document.getElementById('setup-content');
  el.classList.remove('hidden');
  el.innerHTML = '<div class="card text-center" style="padding:40px"><span class="spinner"></span><div class="mt-16">自动配置中...<br><span class="text-sm text-muted">启动服务、配置 LLM、检测环境</span></div></div>';

  try {
    const result = await API.post('/v1/setup/auto-configure', {});
    const steps = (result.steps || []).map(s =>
      `<div class="service-card"><span class="dot ${s.success ? 'dot-ok' : 'dot-fail'}"></span><div class="service-info"><div class="service-name">${s.action}</div><div class="service-detail">${s.message || s.error || ''}</div></div></div>`
    ).join('');
    const ok = result.llm_configured;
    el.innerHTML = `
      <div class="card text-center" style="padding:40px">
        <div style="font-size:48px; margin-bottom:16px">${ok ? '🎉' : '⚠️'}</div>
        <h2 style="margin-bottom:8px">${ok ? '配置完成！' : '部分完成'}</h2>
        <p class="text-muted" style="margin-bottom:24px">${result.warning || '灵枢已就绪，可进行 AI 调研'}</p>
        <div style="text-align:left">${steps}</div>
        <div class="mt-16">
          <button class="btn btn-primary" onclick="renderDashboard()" style="font-size:16px; padding:14px 36px">
            进入控制台 →
          </button>
          <button class="btn btn-secondary btn-sm" onclick="startSetup()" style="margin-left:8px">
            手动配置
          </button>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card text-center" style="padding:40px">
      <div style="font-size:48px; margin-bottom:16px">❌</div>
      <h2>配置失败</h2>
      <p class="text-muted">${e.message}</p>
      <button class="btn btn-primary mt-16" onclick="startSetup()">手动配置</button>
    </div>`;
  }
}

async function fixService(name) {
  const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const result = await API.post('/v1/setup/fix', {action: 'start_' + name});
    if (result.success) { toast(name + ' 启动成功 ✓', 'ok'); renderStep3(); }
    else { toast(name + ' 启动失败: ' + (result.error || '未知错误'), 'err'); }
  } catch(e) { toast('操作失败: ' + e.message, 'err'); }
  btn.disabled = false; btn.innerHTML = '启动';
}

function renderSteps() {
  const steps = ['环境检测', 'LLM 配置', '服务检查', '完成'];
  return `<div class="steps">${
    steps.map((s, i) => {
      const n = i + 1;
      let cls = 'step';
      if (n === setupStep) cls += ' active';
      else if (n < setupStep) cls += ' done';
      return `<div class="${cls}"><span class="num">${n < setupStep ? '✓' : n}</span>${s}</div>`;
    }).join('')
  }</div>`;
}

async function renderStep1() {
  const el = document.getElementById('setup-content');
  el.innerHTML = renderSteps() + `
    <div class="card">
      <div class="card-title">🔍 环境路径检测</div>
      <p class="text-muted text-sm mb-16">检查关键路径是否存在中文字符等问题</p>
      <div id="path-list"><div class="text-center"><span class="spinner"></span> 扫描中...</div></div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-secondary btn-sm" onclick="renderStep1()">重新检测</button>
        <button class="btn btn-primary btn-sm hidden" id="step1-next" onclick="setupStep=2; renderStep2()">下一步 →</button>
      </div>
    </div>`;
  const data = await API.get('/v1/setup/check-paths');
  setupData.paths = data;
  const list = document.getElementById('path-list');
  list.innerHTML = data.map(p => {
    const ok = p.exists && !p.has_chinese;
    const warn = p.has_chinese ? '⚠️ 路径含中文，建议修改' : (p.exists ? '✅ 正常' : '⏸️ 未找到');
    const warnCls = p.has_chinese ? 'path-warn' : (p.exists ? 'path-ok' : 'text-muted');
    return `<div class="path-item">
      <span class="path-label">${p.label}</span>
      <span class="path-value">${p.path || '—'}</span>
      <span class="${warnCls}">${warn}</span>
    </div>`;
  }).join('');
  document.getElementById('step1-next').classList.remove('hidden');
}

async function renderStep2() {
  const el = document.getElementById('setup-content');
  el.innerHTML = renderSteps() + `
    <div class="card">
      <div class="card-title">🤖 LLM 配置</div>
      <p class="text-muted text-sm mb-16">选择推理后端，或使用自动检测</p>
      <div id="llm-backends"><div class="text-center"><span class="spinner"></span> 检测可用后端...</div></div>
      <div class="mt-16 hidden" id="llm-custom">
        <div class="form-group">
          <label class="form-label">API 地址</label>
          <input class="form-input" id="llm-url" placeholder="http://127.0.0.1:8081/v1/chat/completions">
        </div>
        <div class="form-group">
          <label class="form-label">API Key（可选）</label>
          <input class="form-input" id="llm-key" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label class="form-label">模型名称</label>
          <input class="form-input" id="llm-model" placeholder="deepseek-v4">
        </div>
        <button class="btn btn-secondary btn-sm" onclick="testLLM()">测试连接</button>
        <div id="llm-test-result" class="mt-16"></div>
      </div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-secondary btn-sm" onclick="setupStep=1; renderStep1()">← 上一步</button>
        <button class="btn btn-success btn-sm" onclick="quickStartLLM()">⚡ 自动配置</button>
        <button class="btn btn-primary btn-sm" onclick="setupStep=3; renderStep3()">下一步 →</button>
      </div>
    </div>`;
  const backends = await API.get('/v1/setup/llm-backends');
  setupData.llm = backends;
  const container = document.getElementById('llm-backends');
  container.innerHTML = Object.entries(backends).map(([k, v]) => `
    <div class="service-card" style="cursor:pointer" onclick="selectLLM('${k}')">
      <span class="dot ${v.available ? 'dot-ok' : 'dot-fail'}"></span>
      <div class="service-info">
        <div class="service-name">${v.label}</div>
        <div class="service-detail">${v.available ? '可用' : '未运行'} · ${v.endpoint || ''}</div>
      </div>
      <span class="text-sm" style="color:var(--accent)" id="llm-sel-${k}">${k === 'model_proxy' ? '✓ 推荐' : ''}</span>
    </div>
  `).join('');
}

function selectLLM(key) {
  const v = setupData.llm[key];
  document.querySelectorAll('.service-card').forEach(el => el.style.borderColor = '');
  event.currentTarget.style.borderColor = 'var(--accent)';
  setupData.selectedLLM = key;
  setupData.llmEndpoint = v.endpoint;
  if (key === 'deepseek') {
    document.getElementById('llm-custom').classList.remove('hidden');
    document.getElementById('llm-url').value = v.endpoint;
  } else {
    document.getElementById('llm-custom').classList.add('hidden');
  }
}

async function quickStartLLM() {
  const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const result = await API.post('/v1/setup/auto-configure', {});
    if (result.llm_configured) { toast('LLM 自动配置成功 ✓', 'ok'); setupStep = 3; renderStep3(); }
    else { toast('自动配置失败: ' + (result.warning || '请手动选择'), 'err'); }
  } catch(e) { toast('自动配置出错: ' + e.message, 'err'); }
  btn.disabled = false; btn.innerHTML = '⚡ 自动配置';
}

async function testLLM() {
  const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 测试中...';
  const result = await API.post('/v1/setup/test-llm', {
    endpoint: document.getElementById('llm-url').value || setupData.llmEndpoint,
    api_key: document.getElementById('llm-key').value || '',
    model: document.getElementById('llm-model').value || '',
  });
  const el = document.getElementById('llm-test-result');
  el.innerHTML = result.reachable
    ? `<span class="dot dot-ok"></span> 连接成功！`
    : `<span class="dot dot-fail"></span> 连接失败: ${result.error}`;
  btn.disabled = false; btn.textContent = '测试连接';
}

async function renderStep3() {
  const el = document.getElementById('setup-content');
  el.innerHTML = renderSteps() + `
    <div class="card">
      <div class="card-title">🛡️ 环境检查</div>
      <p class="text-muted text-sm mb-16">检测所有服务运行状态</p>
      <div id="env-results"><div class="text-center"><span class="spinner"></span> 检测中...</div></div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-secondary btn-sm" onclick="setupStep=2; renderStep2()">← 上一步</button>
        <button class="btn btn-primary btn-sm" onclick="setupStep=4; renderStep4()">下一步 →</button>
      </div>
    </div>`;
  const env = await API.get('/v1/setup/env-check');
  setupData.env = env;
  const html = [];
  html.push('<div class="card-title" style="font-size:13px;margin-top:8px">推理后端</div>');
  for (const [k, v] of Object.entries(env.llm_backends || {})) {
    const fixable = !v.available && ['model_proxy', 'ollama', 'llamacpp'].includes(k);
    html.push(`<div class="service-card">
      <span class="dot ${v.available ? 'dot-ok' : 'dot-fail'}"></span>
      <div class="service-info">
        <div class="service-name">${v.label}</div>
        <div class="service-detail">${v.available ? '运行中' : '离线'}</div>
      </div>
      ${fixable ? `<button class="btn btn-secondary btn-sm" onclick="fixService('${k}')">启动</button>` : ''}
    </div>`);
  }
  html.push('<div class="card-title" style="font-size:13px;margin-top:16px">辅助服务</div>');
  for (const [k, v] of Object.entries(env.services || {})) {
    const fixable = !v.available && ['searxng', 'comfyui'].includes(k);
    html.push(`<div class="service-card">
      <span class="dot ${v.available ? 'dot-ok' : 'dot-fail'}"></span>
      <div class="service-info">
        <div class="service-name">${v.label}</div>
        <div class="service-detail">${v.available ? '运行中' : '离线'} ${v.endpoint || ''}</div>
      </div>
      ${fixable ? `<button class="btn btn-secondary btn-sm" onclick="fixService('${k}')">启动</button>` : ''}
    </div>`);
  }
  html.push('<div class="card-title" style="font-size:13px;margin-top:16px">路径</div>');
  for (const p of env.paths || []) {
    const ok = p.exists && !p.has_chinese;
    html.push(`<div class="service-card"><span class="dot ${ok ? 'dot-ok' : 'dot-fail'}"></span><div class="service-info"><div class="service-name">${p.label}</div><div class="service-detail">${p.path || '未找到'}</div></div></div>`);
  }
  document.getElementById('env-results').innerHTML = html.join('');
}

async function renderStep4() {
  const llmKey = setupData.selectedLLM || 'model_proxy';
  const llmInfo = setupData.llm[llmKey] || {};
  await API.post('/v1/setup/config', {
    setup_complete: true,
    llm: { backend: llmKey, api_url: llmInfo.endpoint || '', api_key: '', model: 'deepseek-v4' },
  });
  const el = document.getElementById('setup-content');
  el.innerHTML = renderSteps() + `
    <div class="card text-center" style="padding:60px">
      <div style="font-size:48px; margin-bottom:16px">🎉</div>
      <h2 style="margin-bottom:8px">配置完成！</h2>
      <p class="text-muted" style="margin-bottom:24px">灵枢已就绪，可进行 AI 调研</p>
      <button class="btn btn-primary" onclick="renderDashboard()" style="font-size:16px; padding:14px 36px">
        进入控制台 →
      </button>
    </div>`;
}

// ═══════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════
const DASH_TABS = [
  { id: 'chat',    icon: '💬',  label: '对话' },
  { id: 'reports', icon: '📄',  label: '报告' },
  { id: 'status',  icon: '📊',  label: '服务' },
  { id: 'knowledge', icon: '📚', label: '知识库' },
  { id: 'mcp',     icon: '🔌',  label: '工具' },
  { id: 'sessions', icon: '🗂️', label: '会话管理' },
  { id: 'settings', icon: '⚙️', label: '设置' },
  { id: 'skills',  icon: '🧠',  label: '技能' },
];

let dashTab = 'chat';
let dashData = {};

// ─── Sidebar state ───
let sidebarSessions = [];
let chatSessionId = '';
let chatAbortController = null;
let chatHistory = [];
let sidebarFilter = '';

function renderDashboard() {
  document.title = '灵枢 — AI 调研助手';
  dashTab = 'chat';

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Header -->
    <div class="app-header">
      <div class="app-header-left">
        <span class="app-header-logo">⚡ 灵枢</span>
        <span class="app-header-sub">AI 调研助手</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <div style="position:relative" id="settings-menu-container">
          <button class="btn btn-secondary btn-sm" onclick="toggleSettingsMenu()">☰ 菜单 ▾</button>
          <div id="settings-dropdown" class="hidden" style="position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);min-width:160px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.15)">
            <div class="dropdown-item" onclick="switchTab('settings'); closeSettingsMenu()">⚙️ 设置</div>
            <div class="dropdown-item" onclick="switchTab('reports'); closeSettingsMenu()">📄 报告列表</div>
            <div class="dropdown-item" onclick="switchTab('mcp'); closeSettingsMenu()">🔌 工具列表</div>
            <div class="dropdown-item" onclick="switchTab('sessions'); closeSettingsMenu()">🗂️ 会话管理</div>
            <div class="dropdown-item" onclick="switchTab('skills'); closeSettingsMenu()">🧠 技能</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" onclick="checkUpdate(); closeSettingsMenu()">📦 检查更新</div>
            <div class="dropdown-item" onclick="renderSetup(); closeSettingsMenu()">🔄 重新配置</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" onclick="closeSettingsMenu()">❌ 关闭</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Body: Sidebar + Main -->
    <div class="app-body">
      <!-- Sidebar -->
      <div class="app-sidebar" id="sidebar">
        <div class="sidebar-search">
          <input id="sidebar-search-input" type="text" placeholder="搜索会话..." oninput="onSidebarFilterChange()" autocomplete="off">
        </div>
        <div class="sidebar-actions">
          <button class="sidebar-new-btn" onclick="switchToNewSession()">
            <span>✕</span> 新会话
          </button>
        </div>
        <div class="sidebar-list" id="sidebar-list"></div>
      </div>

      <!-- Main content -->
      <div class="app-main">
        <div class="main-tabs" id="main-tabs"></div>
        <div class="main-content" id="dash-content"></div>
      </div>
    </div>
  `;

  // Build tab bar
  renderTabBar();
  // Open chat tab
  switchTab('chat');
  // Load session list
  loadSidebarSessions();
}

function renderTabBar() {
  const bar = document.getElementById('main-tabs');
  bar.innerHTML = DASH_TABS.map(t =>
    `<a class="main-tab" data-tab="${t.id}" href="#" onclick="return switchTab('${t.id}')">${t.icon} ${t.label}</a>`
  ).join('');
}

// ═══════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════
async function loadSidebarSessions() {
  try {
    const data = await API.get('/v1/sessions');
    sidebarSessions = data.sessions || [];
  } catch(e) {
    sidebarSessions = [];
  }
  renderSidebarList();
}

function renderSidebarList() {
  const list = document.getElementById('sidebar-list');
  if (!list) return;
  const filter = sidebarFilter.toLowerCase();
  const filtered = sidebarSessions.filter(s =>
    !filter || (s.preview || '').toLowerCase().includes(filter) || s.id.toLowerCase().includes(filter)
  );
  if (filtered.length === 0) {
    list.innerHTML = '<div class="text-center text-muted text-sm" style="padding:20px">暂无会话</div>';
    return;
  }
  list.innerHTML = filtered.map(s => {
    const isActive = s.id === chatSessionId;
    const preview = (s.preview || '新会话').slice(0, 35);
    const time = formatSidebarTime(s.last_active);
    return `<div class="session-item ${isActive ? 'active' : ''}" onclick="switchToSession('${s.id}')" data-sid="${s.id}">
      <div class="session-item-title">${escHtml(preview)}</div>
      <div class="session-item-preview">${s.exchanges || 0} 条消息</div>
      <div class="session-item-time">${time}</div>
    </div>`;
  }).join('');
}

function formatSidebarTime(seconds) {
  if (seconds == null) return '';
  if (seconds < 60) return '刚刚';
  if (seconds < 3600) return Math.floor(seconds/60) + '分前';
  if (seconds < 86400) return Math.floor(seconds/3600) + '时前';
  return Math.floor(seconds/86400) + '天前';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function onSidebarFilterChange() {
  sidebarFilter = document.getElementById('sidebar-search-input').value;
  renderSidebarList();
}

async function switchToSession(sessionId) {
  if (sessionId === chatSessionId) return;
  chatSessionId = sessionId;
  renderSidebarList();
  await restoreChatSession(sessionId);
}

function switchToNewSession() {
  chatSessionId = 'chat-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  chatHistory = [];
  renderSidebarList();
  const container = document.getElementById('chat-messages');
  if (container) {
    container.innerHTML = '<div class="text-center text-muted text-sm" style="padding:40px">输入消息开始与灵枢对话</div>';
  }
  const count = document.getElementById('chat-msg-count');
  if (count) count.textContent = '';
}

// ═══════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════
function switchTab(tab) {
  dashTab = tab;
  document.querySelectorAll('.main-tab').forEach(a => a.classList.remove('active'));
  document.querySelector(`.main-tab[data-tab="${tab}"]`)?.classList.add('active');
  closeSettingsMenu();

  const content = document.getElementById('dash-content');
  if (tab === 'chat') renderDashChat();
  else if (tab === 'status') renderDashStatus();
  else if (tab === 'knowledge') renderDashKnowledge();
  else if (tab === 'sessions') renderDashSessions();
  else if (tab === 'settings') renderDashSettings();
  else if (tab === 'mcp') renderMCP();
  else if (tab === 'reports') renderReports();
  else if (tab === 'skills') renderSkills();
  return false;
}

function renderDashChat() {
  const el = document.getElementById('dash-content');
  el.innerHTML = `
    <div class="chat-card">
      <div class="chat-messages" id="chat-messages">
        <div class="text-center text-muted text-sm" style="padding:40px">加载中...</div>
      </div>
      <div id="chat-thinking" class="chat-thinking hidden"></div>
      <div class="chat-input-bar">
        <input id="chat-input" class="form-input" placeholder="输入消息，按 Enter 发送..."
          onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendChatMessage() }">
        <button class="btn btn-primary" onclick="sendChatMessage()" id="chat-send-btn">发送</button>
        <button class="btn btn-danger hidden" onclick="cancelChatMessage()" id="chat-cancel-btn">取消</button>
      </div>
    </div>`;
  // Restore session messages if we have one
  if (chatSessionId && chatHistory.length > 0) {
    renderMessages(chatHistory.map(h => ({role: h.role, content: h.content})));
    document.getElementById('chat-msg-count')?.remove();
  } else {
    loadDefaultChatSession();

async function loadDefaultChatSession() {
  chatAbortController = null;
  chatHistory = [];
  try {
    const data = await API.get('/v1/sessions');
    const sessions = data.sessions || [];
    if (sessions.length > 0 && sessions[0].exchanges > 0) {
      chatSessionId = sessions[0].id;
      await restoreChatSession(sessions[0].id);
      renderSidebarList();
    } else {
      startNewChat();
    }
  } catch(e) {
    startNewChat();
  }
}

async function restoreChatSession(sessionId) {
  try {
    const data = await API.get('/v1/sessions/' + sessionId + '/messages');
    const msgs = data.messages || [];
    chatHistory = msgs.map(m => ({role: m.role, content: m.content}));
    renderMessages(msgs);
  } catch(e) {
    startNewChat();
  }
}

function startNewChat() {
  chatSessionId = 'chat-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  chatHistory = [];
  const container = document.getElementById('chat-messages');
  if (container) {
    container.innerHTML = '<div class="text-center text-muted text-sm" style="padding:40px">输入消息开始与灵枢对话</div>';
  }
}

function renderMessages(msgs) {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  container.innerHTML = '';
  if (!msgs || msgs.length === 0) {
    container.innerHTML = '<div class="text-center text-muted text-sm" style="padding:40px">输入消息开始与灵枢对话</div>';
    return;
  }
  msgs.forEach(m => {
    if (m.role === 'user') addChatBubble('user', m.content || '');
    else if (m.role === 'assistant') addChatBubble('assistant', (m.content || '').slice(0, 500));
  });
  container.scrollTop = container.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  document.querySelector('#chat-messages .text-center')?.remove();

  addChatBubble('user', msg);
  input.value = '';
  input.disabled = true;
  document.getElementById('chat-send-btn').classList.add('hidden');
  document.getElementById('chat-cancel-btn').classList.remove('hidden');

  const thinkingEl = document.getElementById('chat-thinking');
  thinkingEl.classList.remove('hidden');
  thinkingEl.innerHTML = '<span class="spinner"></span> 分析中...';
  let thinkingText = '';

  const assistantId = 'assistant-' + Date.now();
  addChatBubble('assistant', '<span class="spinner"></span>', assistantId);
  const assistantEl = document.getElementById(assistantId);

  const messages = [...chatHistory, {role: 'user', content: msg}];

  chatAbortController = new AbortController();
  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Session-Id': chatSessionId},
      body: JSON.stringify({model: 'lingShu-deep', messages, stream: true}),
      signal: chatAbortController.signal,
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';
    let currentThinking = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          const content = parsed.choices?.[0]?.delta?.content || '';
          if (content) {
            fullContent += content;
            if (content.startsWith('🤔') || content.startsWith('🔀') || content.startsWith('▶️') ||
                content.startsWith('✅') || content.startsWith('  ✅') || content.startsWith('  ❌') ||
                content.startsWith('🧠') || content.startsWith('⚡') || content.startsWith('📚')) {
              currentThinking += content;
              thinkingEl.innerHTML = currentThinking.replace(/\n/g, '<br>');
              thinkingEl.scrollTop = thinkingEl.scrollHeight;
            } else {
              if (assistantEl) assistantEl.innerHTML = fullContent.replace(/\n/g, '<br>');
            }
          }
        } catch(e) {}
      }
    }

    chatHistory = messages;
    chatHistory.push({role: 'assistant', content: fullContent});
    if (assistantEl) assistantEl.innerHTML = fullContent.replace(/\n/g, '<br>');
    thinkingEl.classList.add('hidden');

    if (fullContent.length > 100) {
      const btns = document.createElement('div');
      btns.className = 'chat-bubble';
      btns.style.cssText = 'align-self:flex-start; margin-top:4px; display:flex; gap:4px; max-width:100%; background:none; border:none; padding:0';
      btns.innerHTML = `
        <button class="btn btn-secondary btn-sm" onclick="saveReport(this, '${chatSessionId}')">💾 保存报告</button>
        <button class="btn btn-primary btn-sm" onclick="formalizeReport(this, '${chatSessionId}')">📄 生成正式报告</button>`;
      document.getElementById('chat-messages').appendChild(btns);
    }

    // Refresh sidebar (new session may appear)
    loadSidebarSessions();

  } catch(e) {
    if (e.name === 'AbortError') {
      addChatBubble('assistant', '⛔ 任务已取消', null, true);
    } else {
      addChatBubble('assistant', '❌ 错误: ' + e.message, null, true);
    }
  }

  input.disabled = false;
  input.focus();
  document.getElementById('chat-send-btn').classList.remove('hidden');
  document.getElementById('chat-cancel-btn').classList.add('hidden');
  document.getElementById('chat-thinking').classList.add('hidden');
  chatAbortController = null;

  const msgContainer = document.getElementById('chat-messages');
  if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
}

function cancelChatMessage() {
  if (chatAbortController) {
    chatAbortController.abort();
    fetch('/v1/tasks/' + chatSessionId + '/cancel', {method: 'POST'}).catch(()=>{});
  }
}

function addChatBubble(role, content, id, isSystem) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.id = id || '';
  div.className = 'chat-bubble ' + (isSystem ? 'system' : role);
  div.innerHTML = content.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function saveReport(btn, sessionId) {
  const container = document.getElementById('chat-messages');
  const bubbles = container.querySelectorAll('.chat-bubble.assistant');
  const last = bubbles[bubbles.length - 1];
  if (!last) return;
  const content = last.textContent || '';
  const title = '调研报告_' + new Date().toISOString().slice(0,10);
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await fetch('/v1/reports', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title, content, tags:['chat'], source_session:sessionId})});
    toast('报告已保存 ✓', 'ok');
    btn.innerHTML = '💾 已保存'; btn.style.opacity = '0.5';
  } catch(e) { toast('保存失败: ' + e.message, 'err'); btn.disabled = false; btn.innerHTML = '💾 保存报告'; }
}

async function formalizeReport(btn, sessionId) {
  const container = document.getElementById('chat-messages');
  const bubbles = container.querySelectorAll('.chat-bubble.assistant');
  const last = bubbles[bubbles.length - 1];
  if (!last) return;
  const content = last.textContent || '';
  const title = '正式报告_' + new Date().toISOString().slice(0,10);
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 生成中...';

  try {
    const r = await fetch('/v1/reports/formalize', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title, content, tags:['正式报告'], source_session:sessionId}),
    });
    const data = await r.json();
    if (data.id) {
      toast('正式报告已生成 ✓', 'ok');
      btn.innerHTML = '📄 已生成';
      btn.onclick = () => window.open('/v1/reports/' + data.id, '_blank');
    } else {
      toast('生成失败', 'err'); btn.disabled = false; btn.innerHTML = '📄 生成正式报告';
    }
  } catch(e) {
    toast('生成失败: ' + e.message, 'err');
    btn.disabled = false; btn.innerHTML = '📄 生成正式报告';
  }
}

        el.innerHTML = '<div class="card"><div class="card-title">🔌 MCP 工具列表</div><div class="text-center text-muted">MCP API 不可用</div></div>';
      }
    }
  } catch(e) {
    el.innerHTML = '<div class="card"><div class="card-title">🔌 MCP 工具列表</div><div class="text-center text-muted">加载失败</div></div>';
  }
}
