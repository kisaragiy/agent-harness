site_name: Agent Harness
site_description: Agent Harness — 轻量级 AI Agent 开发与评测框架
site_url: https://your-org.github.io/agent-harness
repo_url: https://github.com/your-org/agent-harness
repo_name: your-org/agent-harness
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 架构设计: architecture.md
  - API 参考: api.md
  - CS Demo: cs-demo.md
  - 配置说明: configuration.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/agent-harness
  generator: false

copyright: Copyright &copy; 2026 Agent Harness
