services:
  lingshu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lingshu
    ports:
      - "8788:8788"
    environment:
      - HARNESS_API_HOST=0.0.0.0
      - HARNESS_API_PORT=8788
      - HARNESS_DEEPSEEK_API=${HARNESS_DEEPSEEK_API:-}
      - HARNESS_CLOUD_KEY=${HARNESS_CLOUD_KEY:-}
      - HARNESS_LLAMA_API=${HARNESS_LLAMA_API:-}
      - HARNESS_MAX_CONCURRENT_AGENTS=${HARNESS_MAX_CONCURRENT_AGENTS:-5}
      - HARNESS_DISABLE_AUTH=${HARNESS_DISABLE_AUTH:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: Self-hosted search engine
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "4000:8080"
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:4000
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me-in-production}
    volumes:
      - searxng_data:/etc/searxng:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

volumes:
  searxng_data:
